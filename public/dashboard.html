<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lynzxz Hub | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (style sama seperti sebelumnya, tidak berubah) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #03060c 100%);
            font-family: 'Courier New', monospace;
            color: #0f0;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1f2a; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 3px; }
        .dashboard { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: rgba(5,10,20,0.9);
            backdrop-filter: blur(8px);
            border-right: 1px solid #0ff;
            padding: 20px 15px;
            transition: 0.3s;
            z-index: 10;
        }
        .logo-sidebar {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #0ff;
        }
        .logo-sidebar h2 {
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 24px;
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            margin: 8px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: #bbccff;
            font-weight: 500;
        }
        .menu-item i { width: 28px; font-size: 18px; }
        .menu-item:hover { background: rgba(0,255,255,0.1); transform: translateX(5px); color: #0ff; }
        .menu-item.active { background: linear-gradient(90deg, rgba(0,255,255,0.2), rgba(0,255,255,0.05)); border-left: 3px solid #0ff; color: #0ff; }
        .main-content { flex: 1; padding: 20px 30px; overflow-y: auto; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0ff;
            flex-wrap: wrap;
            gap: 10px;
        }
        .top-bar h1 { font-size: 22px; color: #ccddff; }
        .session-info { font-size: 12px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; font-family: monospace; }
        .module-container { animation: fadeIn 0.3s ease; }
        .module-card {
            background: rgba(10,20,30,0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #0ff;
            margin-bottom: 20px;
        }
        .log-panel {
            background: rgba(0,0,0,0.7);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #336699;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            color: #0ff;
        }
        .log-list {
            max-height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            padding: 6px 8px;
            border-bottom: 1px solid #224466;
            color: #bbffbb;
        }
        .log-entry .time { color: #88aaff; margin-right: 12px; }
        .log-entry.success { border-left: 3px solid #0f0; }
        .log-entry.error { border-left: 3px solid #f44; color: #ffaaaa; }
        .log-entry.warning { border-left: 3px solid #ffaa44; color: #ffdd88; }
        .clear-log {
            background: none;
            border: 1px solid #ff6666;
            color: #ff6666;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }
        .clear-log:hover { background: #ff6666; color: black; }
        .input-group-module { margin-bottom: 18px; }
        .input-group-module label { display: block; margin-bottom: 6px; color: #aaccff; font-size: 13px; }
        .input-group-module input, .input-group-module select, .input-group-module textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #2a4c7a;
            border-radius: 10px;
            color: #0ff;
            font-family: monospace;
        }
        .input-group-module input:focus { outline: none; border-color: #0ff; box-shadow: 0 0 5px rgba(0,255,255,0.3); }
        .btn-primary {
            background: linear-gradient(90deg, #0066aa, #00aa88);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 12px rgba(0,255,255,0.5); }
        .btn-danger { background: linear-gradient(90deg, #aa3366, #ff4444); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 15px 5px; }
            .sidebar .menu-item span { display: none; }
            .logo-sidebar h2 { font-size: 14px; }
            .main-content { padding: 15px; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="sidebar">
        <div class="logo-sidebar"><h2>LYNXZX</h2><p style="font-size:10px;">v3.0 | by @LynzxzCreator</p></div>
        <div class="menu-list" id="menuList">
            <div class="menu-item" data-module="ddos"><i class="fas fa-bolt"></i> <span>DDoS Attack</span></div>
            <div class="menu-item" data-module="deface"><i class="fas fa-paint-roller"></i> <span>Deface Generator</span></div>
            <div class="menu-item" data-module="wordpress"><i class="fab fa-wordpress"></i> <span>WordPress Checker</span></div>
            <div class="menu-item" data-module="sql"><i class="fas fa-database"></i> <span>SQL Inject Scanner</span></div>
            <div class="menu-item" data-module="adminfinder"><i class="fas fa-user-secret"></i> <span>Admin Finder</span></div>
            <div class="menu-item" data-module="bruteforce"><i class="fas fa-key"></i> <span>Brute Force</span></div>
            <div class="menu-item" data-module="advanced"><i class="fas fa-skull"></i> <span>Advanced Tools</span></div>
            <div class="menu-item" data-module="osint"><i class="fas fa-search-location"></i> <span>OSINT Intel</span></div>
            <div id="developerMenuItem" style="display:none;" class="menu-item" data-module="adminpanel"><i class="fas fa-crown"></i> <span>👑 Developer Panel</span></div>
            <div class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></div>
        </div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <h1 id="moduleTitle">Lynzxz Hub</h1>
            <div class="session-info" id="userInfo"></div>
        </div>
        <div id="moduleContainer" class="module-container">
            <div class="module-card">Silakan pilih menu di samping.</div>
        </div>
        <div class="log-panel">
            <div class="log-header"><span><i class="fas fa-terminal"></i> ACTIVITY LOG [GLOBAL]</span><button class="clear-log" onclick="clearAllLogs()"><i class="fas fa-trash"></i> Clear All</button></div>
            <div id="globalLogList" class="log-list"></div>
        </div>
    </div>
</div>

<script>
// ==================== AUTH & STORAGE INIT ====================
function initDatabase() {
    if(!localStorage.getItem('lynzxz_users')) {
        localStorage.setItem('lynzxz_users', JSON.stringify({
            'developer': { password: '050411', role: 'developer', createdAt: new Date().toISOString() }
        }));
    }
    if(!localStorage.getItem('lynzxz_keys')) localStorage.setItem('lynzxz_keys', JSON.stringify([]));
    if(!localStorage.getItem('lynzxz_blacklist')) localStorage.setItem('lynzxz_blacklist', JSON.stringify([]));
    if(!localStorage.getItem('lynzxz_access_logs')) localStorage.setItem('lynzxz_access_logs', JSON.stringify([]));
    if(!localStorage.getItem('lynzxz_global_logs')) localStorage.setItem('lynzxz_global_logs', JSON.stringify([]));
}
initDatabase();

// Session
let currentUser = null;
function getSession() {
    const sess = sessionStorage.getItem('lynzxz_session');
    if(sess) currentUser = JSON.parse(sess);
    else window.location.href = 'index.html';
    return currentUser;
}
getSession();

function isDeveloper() { return currentUser && currentUser.role === 'developer'; }
function isPremium() { return currentUser && (currentUser.role === 'premium' || currentUser.role === 'developer'); }
function isGuest() { return currentUser && currentUser.role === 'guest'; }

function canExecute(target = null) {
    if(!currentUser) return false;
    if(currentUser.role === 'guest') { alert('⚠️ Mode Guest: hanya bisa melihat, tidak bisa mengeksekusi!'); return false; }
    if(currentUser.role === 'developer') return true;
    if(target && isProtectedTarget(target)) { alert('⛔ Target ini dilindungi oleh Developer!'); return false; }
    return true;
}
function isProtectedTarget(url) {
    try {
        const blacklist = JSON.parse(localStorage.getItem('lynzxz_blacklist') || '[]');
        const domain = new URL(url).hostname;
        return blacklist.some(item => domain.includes(item) || url.includes(item));
    } catch(e) { return false; }
}
function addLog(type, module, target, message, status='info') {
    const logs = JSON.parse(localStorage.getItem('lynzxz_global_logs') || '[]');
    logs.unshift({ id: Date.now(), timestamp: new Date().toLocaleString(), type, module, target, message, status });
    if(logs.length > 200) logs.pop();
    localStorage.setItem('lynzxz_global_logs', JSON.stringify(logs));
    renderLogs();
}
function renderLogs() {
    const container = document.getElementById('globalLogList');
    if(!container) return;
    const logs = JSON.parse(localStorage.getItem('lynzxz_global_logs') || '[]');
    if(logs.length === 0) { container.innerHTML = '<div class="log-entry">✨ Belum ada aktivitas</div>'; return; }
    container.innerHTML = logs.map(log => `
        <div class="log-entry ${log.status}">
            <span class="time">[${log.timestamp}]</span>
            <strong>${log.module}</strong> → ${log.message}
            ${log.target ? `<span style="color:#88aaff"> (${log.target})</span>` : ''}
        </div>
    `).join('');
}
function clearAllLogs() {
    if(confirm('Hapus semua log?')) {
        localStorage.setItem('lynzxz_global_logs', JSON.stringify([]));
        renderLogs();
        addLog('system', 'Logger', 'System', 'Semua log dihapus', 'info');
    }
}
function logout() { sessionStorage.removeItem('lynzxz_session'); window.location.href = 'index.html'; }

// ==================== MODULE LOADER ====================
const moduleMap = {
    ddos: { file: 'ddos.js', func: 'renderDdos' },
    deface: { file: 'deface.js', func: 'renderDeface' },
    wordpress: { file: 'wordpress.js', func: 'renderWordPress' },
    sql: { file: 'sql.js', func: 'renderSQL' },
    adminfinder: { file: 'admin.js', func: 'renderAdmin' },
    bruteforce: { file: 'bruteforce.js', func: 'renderBrute' },
    advanced: { file: 'advanced.js', func: 'renderAdvanced' },
    osint: { file: 'osint.js', func: 'renderOSINT' },
    adminpanel: { file: null, func: null } // built-in
};

let currentModule = 'ddos';
const loadedScripts = {};

function loadModule(moduleName) {
    currentModule = moduleName;
    const container = document.getElementById('moduleContainer');
    const titleMap = {
        ddos:'⚡ DDoS Attack',
        deface:'🎨 Deface Generator',
        wordpress:'🔍 WordPress Scanner',
        sql:'💉 SQL Injection Scanner',
        adminfinder:'🔎 Admin Panel Finder',
        bruteforce:'🔑 Brute Force Attack',
        advanced:'💀 Advanced Arsenal',
        osint:'🕵️ OSINT Intelligence',
        adminpanel:'👑 Developer Panel'
    };
    document.getElementById('moduleTitle').innerHTML = titleMap[moduleName] || 'Module';
    
    if(moduleName === 'adminpanel') {
        renderDeveloperPanel(container);
        return;
    }
    
    const mod = moduleMap[moduleName];
    if(!mod) {
        container.innerHTML = `<div class="module-card">❌ Modul ${moduleName} tidak dikenal.</div>`;
        return;
    }
    
    // Check if function already exists
    if(window[mod.func]) {
        window[mod.func](container);
        return;
    }
    
    // Load script if not already loaded
    if(loadedScripts[mod.file]) {
        // script loaded but function not defined? maybe error
        container.innerHTML = `<div class="module-card">❌ Modul ${moduleName} gagal dimuat. Fungsi ${mod.func} tidak ditemukan.</div>`;
        return;
    }
    
    const script = document.createElement('script');
    script.src = `js/modules/${mod.file}`;
    script.onload = () => {
        if(window[mod.func]) {
            window[mod.func](container);
        } else {
            container.innerHTML = `<div class="module-card">❌ Modul ${moduleName}: fungsi ${mod.func} tidak ditemukan. Periksa file ${mod.file}.</div>`;
        }
    };
    script.onerror = () => {
        container.innerHTML = `<div class="module-card">❌ Gagal memuat modul ${moduleName}. File js/modules/${mod.file} tidak ditemukan.</div>`;
    };
    document.head.appendChild(script);
    loadedScripts[mod.file] = true;
}

// ==================== DEVELOPER PANEL (BUILT-IN) ====================
function renderDeveloperPanel(container) {
    if(!isDeveloper()) {
        container.innerHTML = `<div class="module-card"><h3>⛔ ACCESS DENIED</h3><p>Hanya Developer yang dapat mengakses panel ini.</p></div>`;
        return;
    }
    
    const users = JSON.parse(localStorage.getItem('lynzxz_users') || '{}');
    const logs = JSON.parse(localStorage.getItem('lynzxz_access_logs') || '[]');
    const blacklist = JSON.parse(localStorage.getItem('lynzxz_blacklist') || '[]');
    const keys = JSON.parse(localStorage.getItem('lynzxz_keys') || '[]');
    const unusedKeys = keys.filter(k => !k.usedBy);
    
    container.innerHTML = `
        <div class="module-card">
            <h3><i class="fas fa-crown"></i> 👑 DEVELOPER PANEL</h3>
            <div style="display:flex; gap:10px; margin:15px 0; border-bottom:1px solid #336699; flex-wrap:wrap;">
                <button class="dev-tab active" data-tab="users">👥 User Management</button>
                <button class="dev-tab" data-tab="keys">🔑 Key Management</button>
                <button class="dev-tab" data-tab="protect">🛡️ Protected Targets</button>
                <button class="dev-tab" data-tab="logs">📋 System Logs</button>
            </div>
            <!-- Users Tab -->
            <div id="devUsers" class="dev-tab-content active">
                <h4>Registered Users</h4>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse;">
                        <tr style="border-bottom:2px solid #0ff;"><th>Username</th><th>Role</th><th>Created</th><th>Actions</th> </tr>
                        ${Object.entries(users).map(([uname, data]) => `
                            <tr style="border-bottom:1px solid #224466;">
                                <td>${uname}</td>
                                <td>${data.role === 'developer' ? '👑 DEVELOPER' : data.role === 'premium' ? '⭐ PREMIUM' : '👤 USER'}</td>
                                <td>${data.createdAt ? new Date(data.createdAt).toLocaleDateString() : '-'}</td>
                                <td>${data.role !== 'developer' ? `
                                    <button class="promote-user" data-username="${uname}" style="background:#0ff; border:none; padding:2px 8px; border-radius:4px; cursor:pointer;">⭐ Premium</button>
                                    <button class="delete-user" data-username="${uname}" style="background:#f44; border:none; padding:2px 8px; border-radius:4px; cursor:pointer;">🗑️</button>
                                ` : '<span style="color:#aaa;">🔒</span>'}</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
                <h4>Create New User</h4>
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
                    <input type="text" id="newUsername" placeholder="Username" style="background:#000; border:1px solid #0ff; padding:8px;">
                    <input type="password" id="newPassword" placeholder="Password" style="background:#000; border:1px solid #0ff; padding:8px;">
                    <select id="newRole" style="background:#000; border:1px solid #0ff; padding:8px;">
                        <option value="premium">Premium</option>
                        <option value="user">Regular User</option>
                    </select>
                    <button id="createUserBtn" style="background:#0ff; border:none; padding:8px 16px; cursor:pointer;">CREATE</button>
                </div>
            </div>
            <!-- Keys Tab -->
            <div id="devKeys" class="dev-tab-content" style="display:none;">
                <h4>Generate Registration Keys</h4>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="number" id="keyCount" placeholder="Jumlah key" value="1" min="1" max="10" style="width:100px; background:#000; border:1px solid #0ff;">
                    <button id="generateKeysBtn" style="background:#0ff; border:none; padding:8px 16px; cursor:pointer;">🔑 Generate Key(s)</button>
                </div>
                <h4>Unused Keys</h4>
                <div style="background:#000; padding:10px; border-radius:8px; max-height:200px; overflow-y:auto;">
                    ${unusedKeys.length === 0 ? '<div>Belum ada key yang belum digunakan.</div>' : unusedKeys.map(k => `
                        <div style="display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid #224466;">
                            <span><i class="fas fa-key"></i> ${k.key}</span>
                            <button class="delete-key" data-key="${k.key}" style="background:#f44; border:none; padding:2px 8px; cursor:pointer;">Hapus</button>
                        </div>
                    `).join('')}
                </div>
                <h4>Used Keys</h4>
                <div style="background:#000; padding:10px; border-radius:8px; max-height:150px; overflow-y:auto;">
                    ${keys.filter(k => k.usedBy).length === 0 ? '<div>Belum ada key yang digunakan.</div>' : keys.filter(k => k.usedBy).map(k => `
                        <div style="padding:4px; border-bottom:1px solid #224466; font-size:11px;">
                            ${k.key} → <strong>${k.usedBy}</strong> (${new Date(k.usedAt).toLocaleString()})
                        </div>
                    `).join('')}
                </div>
            </div>
            <!-- Protect Tab -->
            <div id="devProtect" class="dev-tab-content" style="display:none;">
                <h4>Protected Domains</h4>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <input type="text" id="newDomain" placeholder="contoh: lynzxz.vercel.app" style="flex:1; background:#000; border:1px solid #0ff; padding:10px;">
                    <button id="addDomainBtn" style="background:#0ff; border:none; padding:10px 20px; cursor:pointer;">ADD</button>
                </div>
                <div style="background:#000; padding:10px; border-radius:8px;">
                    ${blacklist.length === 0 ? '<div>Belum ada domain diproteksi</div>' : blacklist.map(d => `
                        <div style="display:flex; justify-content:space-between; padding:6px; border-bottom:1px solid #224466;">
                            <span>🔒 ${d}</span>
                            <button class="remove-domain" data-domain="${d}" style="background:#f44; border:none; padding:2px 8px; cursor:pointer;">Hapus</button>
                        </div>
                    `).join('')}
                </div>
            </div>
            <!-- Logs Tab -->
            <div id="devLogs" class="dev-tab-content" style="display:none;">
                <div style="display:flex; justify-content:space-between;"><h4>Access Logs</h4><button id="clearLogsBtn" style="background:#f44; border:none; padding:4px 12px; cursor:pointer;">Clear All</button></div>
                <div style="background:#000; padding:10px; border-radius:8px; max-height:300px; overflow-y:auto; font-size:11px;">
                    ${logs.length === 0 ? '<div>Belum ada aktivitas</div>' : logs.map(log => `
                        <div style="padding:4px; border-bottom:1px solid #224466;">
                            [${new Date(log.timestamp).toLocaleString()}] <strong>${log.user}</strong> → ${log.action} ${log.target ? `→ ${log.target}` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
    
    // Attach events using event delegation to avoid reload issues
    container.querySelectorAll('.dev-tab').forEach(tab => {
        tab.onclick = (e) => {
            e.stopPropagation();
            const tabId = tab.dataset.tab;
            container.querySelectorAll('.dev-tab').forEach(t => t.classList.remove('active'));
            container.querySelectorAll('.dev-tab-content').forEach(c => c.style.display = 'none');
            tab.classList.add('active');
            container.querySelector(`#dev${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).style.display = 'block';
        };
    });
    
    // Create user
    const createBtn = container.querySelector('#createUserBtn');
    if(createBtn) {
        createBtn.onclick = (e) => {
            e.stopPropagation();
            const uname = container.querySelector('#newUsername').value.trim();
            const pwd = container.querySelector('#newPassword').value;
            const role = container.querySelector('#newRole').value;
            if(!uname || !pwd) { alert('Isi username dan password'); return; }
            const users = JSON.parse(localStorage.getItem('lynzxz_users') || '{}');
            if(users[uname]) { alert('Username sudah ada'); return; }
            users[uname] = { password: pwd, role: role, createdAt: new Date().toISOString() };
            localStorage.setItem('lynzxz_users', JSON.stringify(users));
            addLog('admin', 'User Management', uname, `User ${uname} dibuat (role ${role})`, 'success');
            location.reload();
        };
    }
    
    // Generate keys
    const genBtn = container.querySelector('#generateKeysBtn');
    if(genBtn) {
        genBtn.onclick = (e) => {
            e.stopPropagation();
            let count = parseInt(container.querySelector('#keyCount').value) || 1;
            if(count > 10) count = 10;
            const keys = JSON.parse(localStorage.getItem('lynzxz_keys') || '[]');
            const newKeys = [];
            for(let i=0; i<count; i++) {
                const key = Math.random().toString(36).substring(2, 10).toUpperCase();
                newKeys.push({ key, usedBy: null, createdAt: new Date().toISOString() });
            }
            localStorage.setItem('lynzxz_keys', JSON.stringify([...keys, ...newKeys]));
            addLog('admin', 'Key Management', `generated ${count} key(s)`, `${count} key(s) dibuat`, 'success');
            location.reload();
        };
    }
    
    // Delete key
    container.querySelectorAll('.delete-key').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const key = btn.dataset.key;
            if(confirm(`Hapus key ${key}?`)) {
                let keys = JSON.parse(localStorage.getItem('lynzxz_keys') || '[]');
                keys = keys.filter(k => k.key !== key);
                localStorage.setItem('lynzxz_keys', JSON.stringify(keys));
                addLog('admin', 'Key Management', key, `Key ${key} dihapus`, 'info');
                location.reload();
            }
        };
    });
    
    // Promote user
    container.querySelectorAll('.promote-user').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const uname = btn.dataset.username;
            const users = JSON.parse(localStorage.getItem('lynzxz_users') || '{}');
            if(users[uname] && users[uname].role !== 'developer') {
                users[uname].role = 'premium';
                localStorage.setItem('lynzxz_users', JSON.stringify(users));
                addLog('admin', 'User Management', uname, `User ${uname} dipromosikan ke premium`, 'success');
                location.reload();
            }
        };
    });
    
    // Delete user
    container.querySelectorAll('.delete-user').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const uname = btn.dataset.username;
            if(confirm(`Hapus user ${uname}?`)) {
                const users = JSON.parse(localStorage.getItem('lynzxz_users') || '{}');
                if(users[uname] && users[uname].role !== 'developer') {
                    delete users[uname];
                    localStorage.setItem('lynzxz_users', JSON.stringify(users));
                    addLog('admin', 'User Management', uname, `User ${uname} dihapus`, 'warning');
                    location.reload();
                }
            }
        };
    });
    
    // Add domain
    const addDomainBtn = container.querySelector('#addDomainBtn');
    if(addDomainBtn) {
        addDomainBtn.onclick = (e) => {
            e.stopPropagation();
            let domain = container.querySelector('#newDomain').value.trim();
            if(!domain) return;
            domain = domain.replace(/^https?:\/\//, '').split('/')[0];
            const black = JSON.parse(localStorage.getItem('lynzxz_blacklist') || '[]');
            if(!black.includes(domain)) {
                black.push(domain);
                localStorage.setItem('lynzxz_blacklist', JSON.stringify(black));
                addLog('security', 'Blacklist', domain, `Domain ${domain} diproteksi`, 'success');
                location.reload();
            }
        };
    }
    
    // Remove domain
    container.querySelectorAll('.remove-domain').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const domain = btn.dataset.domain;
            let black = JSON.parse(localStorage.getItem('lynzxz_blacklist') || '[]');
            black = black.filter(d => d !== domain);
            localStorage.setItem('lynzxz_blacklist', JSON.stringify(black));
            addLog('security', 'Blacklist', domain, `Domain ${domain} dihapus dari proteksi`, 'info');
            location.reload();
        };
    });
    
    // Clear logs
    const clearLogsBtn = container.querySelector('#clearLogsBtn');
    if(clearLogsBtn) {
        clearLogsBtn.onclick = (e) => {
            e.stopPropagation();
            if(confirm('Hapus semua log akses?')) {
                localStorage.setItem('lynzxz_access_logs', JSON.stringify([]));
                addLog('admin', 'Logs', 'System', 'Log akses dibersihkan', 'info');
                location.reload();
            }
        };
    }
}

// ==================== MENU HANDLER ====================
function attachMenuListeners() {
    document.querySelectorAll('.menu-item[data-module]').forEach(item => {
        item.removeEventListener('click', menuClickHandler);
        item.addEventListener('click', menuClickHandler);
    });
}
function menuClickHandler(e) {
    e.stopPropagation();
    const mod = this.dataset.module;
    if(mod === 'adminpanel' && !isDeveloper()) {
        alert('Akses ditolak! Hanya Developer.');
        return;
    }
    loadModule(mod);
}
function updateActiveMenu(moduleName) {
    document.querySelectorAll('.menu-item').forEach(item => {
        if(item.dataset.module === moduleName) item.classList.add('active');
        else item.classList.remove('active');
    });
}
// Override loadModule to update menu
const origLoad = loadModule;
window.loadModule = function(moduleName) {
    origLoad(moduleName);
    updateActiveMenu(moduleName);
};
loadModule = window.loadModule;

// ==================== INIT ====================
attachMenuListeners();
if(isDeveloper()) document.getElementById('developerMenuItem').style.display = 'flex';

const userSpan = document.getElementById('userInfo');
if(currentUser) {
    let roleText = currentUser.role === 'developer' ? '👑 DEVELOPER' : (currentUser.role === 'premium' ? '⭐ PREMIUM' : '👤 GUEST');
    userSpan.innerHTML = `<i class="fas fa-user-astronaut"></i> ${currentUser.username} | ${roleText}`;
} else userSpan.innerHTML = `<i class="fas fa-user-astronaut"></i> Guest Mode`;

const accessLogs = JSON.parse(localStorage.getItem('lynzxz_access_logs') || '[]');
accessLogs.unshift({ user: currentUser?.username || 'guest', action: 'login', target: '', timestamp: new Date().toISOString() });
if(accessLogs.length > 100) accessLogs.pop();
localStorage.setItem('lynzxz_access_logs', JSON.stringify(accessLogs));

renderLogs();
loadModule('ddos');
</script>
